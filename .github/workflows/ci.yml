name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    name: PHP 7.4 (runtime)
    runs-on: ubuntu-latest
    # Gates run on the PHP this plugin claims to support. require-dev
    # pins php >=8.1, so the check scripts run in the tooling job
    # below instead.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          # zip: build.php assembles the release archive with ZipArchive.
          extensions: mbstring, intl, json, zip
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          # Keyed on composer.json: composer.lock is untracked in several of
          # these repos, so it is not a reliable cache key across the suite.
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php7.4-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php7.4-composer-

      # --- Gates -----------------------------------------------------------
      # These fail the build. Each is verified to pass in this repo today.

      - name: Validate composer.json
        # --no-check-lock: composer.lock is untracked in some repos and drifted
        # from composer.json in others. Lock state is reported as advisory
        # rather than blocking every PR in the suite.
        run: composer validate --no-check-lock

      # No install step: this plugin declares no runtime packages
      # beyond php itself, and composer's --no-dev still resolves
      # require-dev (which pins php >=8.1), so installing here
      # is both impossible and unnecessary. build.php needs no
      # autoloader, and the lint reads the source directly.

      - name: Lint PHP syntax
        # Shipped code only: tests/ is covered by the advisory test run, and
        # some suites currently contain files that cannot be parsed.
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! out=$(php -l "$file" 2>&1); then
              echo "$out"
              status=1
            fi
          done < <(find . -path ./vendor -prune -o -path ./build -prune \
                        -o -path ./tests -prune -o -path ./node_modules -prune \
                        -o -name '*.php' -print0)
          exit $status

      - name: Build production archive
        # The build is what /bump ships, so a broken build must fail the PR.
        run: composer build:production

  tooling:
    name: PHP 8.1 (tooling)
    runs-on: ubuntu-latest
    # require-dev pins php >=8.1; the check scripts cannot run on 7.4.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          # zip: build.php assembles the release archive with ZipArchive.
          extensions: mbstring, intl, json, zip
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          # Keyed on composer.json: composer.lock is untracked in several of
          # these repos, so it is not a reliable cache key across the suite.
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.1-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.1-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # --- Advisory --------------------------------------------------------
      # Reported but not yet enforced. Promote to a gate once a repo is green.

      - name: PHPStan (advisory)
        run: composer phpstan
        continue-on-error: true

      - name: PHPCS (advisory)
        run: composer phpcs
        continue-on-error: true

      - name: PHPUnit (advisory)
        run: composer test
        continue-on-error: true

      - name: composer.lock up to date (advisory)
        run: composer validate
        continue-on-error: true
